server:
  port: 8080
  servlet:
    context-path: /api

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/museum_db?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  redis:
    host: localhost
    port: 6379
    timeout: 2000ms
  mail:
    host: smtp.qq.com
    port: 587
    username: your_email@qq.com
    password: your_authorization_code   # 授权码
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: yourSecretKeyForJwtTokenGeneration2025!@#  # 请改为复杂密钥
  expiration: 86400000  # 24小时

logging:
  level:
    com.museum: DEBUG
